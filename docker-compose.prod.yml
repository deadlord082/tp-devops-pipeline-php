# Production docker-compose — respecte la topologie 2 réseaux du README :
#  - frontend : web <-> app (seul port publié vers l'hôte)
#  - backend  : app <-> db, app <-> cache (aucun port exposé)
# Configurez un fichier `.env` sur le serveur d'après `.env.example`.

services:
  web:
    image: nginx:1.27-alpine
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT}:82"   # exposé uniquement sur l'hôte (Nginx Proxy Manager forward)
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    # L'image doit être l'image publiée par la CI (GHCR). Définir APP_IMAGE dans .env sur le serveur.
    image: ${APP_IMAGE}
    env_file: .env
    restart: unless-stopped
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  db:
    image: mariadb:11.4
    env_file: .env
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"${MARIADB_USER}\" -p\"${MARIADB_PASSWORD}\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  db_data:
