name: Deploy to production

on:
  workflow_call:
    inputs:
      app_image:
        description: 'Full image reference (ghcr.io/owner/repo:tag)'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Ensure remote nginx directory exists
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/ubuntu/apps/projects/pipeline-php/docker/nginx

      - name: Upload Nginx default.conf to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/nginx/default.conf"
          target: "/home/ubuntu/apps/projects/pipeline-php/docker/nginx/default.conf"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/apps/projects/pipeline-php
            # ensure .env exists and set/replace APP_IMAGE without overwriting other vars
            touch .env
            APP_IMAGE_VALUE="${{ inputs.app_image }}"
            if grep -q '^APP_IMAGE=' .env; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${APP_IMAGE_VALUE}|" .env
            else
              echo "APP_IMAGE=${APP_IMAGE_VALUE}" >> .env
            fi
            docker compose pull
            docker compose down
            docker compose up -d --remove-orphans
            docker system prune -a -f